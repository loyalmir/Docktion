<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>독션 식수체크</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --paper:#f4f1ea; --card:#fff; --ink:#2a2620; --ink-soft:#8a8275; --line:#e6e1d6;
    --o:#1f9d57; --x:#d4453e; --leader:#c2410c; --mgr:#6d28d9; --live:#16a34a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Pretendard',-apple-system,system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.4;padding-bottom:48px;}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px;}

  header{padding:18px 0 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  header h1{font-size:20px;font-weight:800;letter-spacing:-0.02em;margin:0;}
  .htools{display:flex;align-items:center;gap:10px;}
  .conn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);font-weight:600;}
  .dot{width:8px;height:8px;border-radius:50%;background:#cbb;transition:.3s;}
  .dot.on{background:var(--live);box-shadow:0 0 0 3px rgba(22,163,74,.18);}
  .edit-btn{border:1.5px solid var(--ink);background:#fff;color:var(--ink);font-family:inherit;font-size:13px;font-weight:800;border-radius:11px;padding:7px 13px;cursor:pointer;}
  body.edit .edit-btn{background:var(--ink);color:#fff;}

  .sticky{position:sticky;top:0;z-index:20;background:var(--paper);padding-top:6px;}
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);border-radius:13px;padding:7px 13px;text-align:center;cursor:pointer;transition:.15s;min-width:52px;}
  .tab b{display:block;font-size:15px;font-weight:800;letter-spacing:-0.02em;}
  .tab span{display:block;font-size:11px;color:var(--ink-soft);font-weight:600;margin-top:1px;}
  .tab.active{background:var(--ink);border-color:var(--ink);}
  .tab.active b,.tab.active span{color:#fff;}

  .date-edit{display:none;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:10px 12px;margin-bottom:12px;}
  body.edit .date-edit{display:block;}
  .de-title{font-size:12px;font-weight:800;color:var(--ink-soft);margin-bottom:8px;}
  .de-chips{display:flex;flex-wrap:wrap;gap:7px;}
  .de-chip{display:flex;align-items:center;gap:5px;border:1.5px solid var(--line);border-radius:10px;padding:5px 8px;font-size:13px;font-weight:700;background:#faf8f3;}
  .de-chip .wd{color:var(--ink-soft);font-weight:600;}
  .de-chip .mini{width:22px;height:22px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:14px;padding:0;color:var(--ink-soft);}
  .de-chip .mini.del{color:var(--x);font-weight:800;}
  .de-add{border:1.5px dashed var(--line);background:transparent;color:var(--ink-soft);font-family:inherit;font-weight:800;font-size:13px;border-radius:10px;padding:6px 11px;cursor:pointer;}

  .edit-note{display:none;background:#fffaf0;border:1.5px solid #f0e2c8;border-radius:12px;padding:9px 12px;margin-bottom:12px;font-size:12px;font-weight:600;color:#8a6d3b;line-height:1.6;}
  body.edit .edit-note{display:block;}
  .edit-note b{font-weight:800;}
  .import-box{display:none;margin-bottom:12px;}
  body.edit .import-box{display:block;}
  .imp-hint{font-size:11px;color:var(--ink-soft);font-weight:600;line-height:1.6;margin-top:7px;text-align:center;}
  .imp-hint b{font-weight:800;color:var(--ink);}

  .summary{display:flex;gap:10px;padding-bottom:14px;}
  .scard{flex:1;background:var(--card);border:1.5px solid #cfe9d8;border-radius:16px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;}
  .scard.sc-v{border-color:#f0c2c2;}
  .scard.sc-v .num{color:var(--x);}
  .scard .lab{font-size:13px;font-weight:700;color:var(--ink-soft);}
  .scard .num{font-size:30px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:var(--o);}
  .scard .num small{font-size:14px;font-weight:700;color:var(--ink-soft);margin-left:2px;}

  .card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden;}
  .card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--line);background:#faf8f3;gap:10px;}
  .card-name{font-size:15px;font-weight:800;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;}
  .card-name.mgr{color:var(--mgr);}
  .card-name-edit{font-family:inherit;font-size:15px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);background:none;border:none;padding:0;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .card-sub{font-size:12px;font-weight:700;color:var(--ink-soft);white-space:nowrap;}
  .card-sub i{font-style:normal;color:var(--o);}
  .team-del{width:26px;height:26px;border-radius:8px;border:1.5px solid #f0c0c0;background:#fff;color:var(--x);font-weight:800;font-size:15px;line-height:1;cursor:pointer;padding:0;display:none;}
  body.edit .team-del{display:inline-block;}

  .labs{display:flex;gap:6px;}
  .labs span{width:46px;text-align:center;font-size:11px;font-weight:800;color:var(--ink-soft);}
  .col-head.n{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px 15px 2px;}
  .col-head.e{display:grid;grid-template-columns:24px 1fr auto 30px 30px;gap:8px;align-items:center;padding:8px 15px 2px;}

  .row.n{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px 15px;border-top:1px solid #f1ede4;}
  .row.e{display:grid;grid-template-columns:24px 1fr auto 30px 30px;gap:8px;align-items:center;padding:8px 15px;border-top:1px solid #f1ede4;}
  .grip{width:24px;height:32px;border:none;background:none;color:#c3bdb0;font-size:17px;line-height:1;cursor:grab;padding:0;touch-action:none;}
  .row.e.dragging{opacity:.9;background:#f3efe6;box-shadow:0 5px 14px rgba(0,0,0,.14);border-radius:10px;position:relative;z-index:5;}
  .row.off{opacity:.42;}
  .nm{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;min-width:0;}
  .nm-edit{background:none;border:none;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;padding:0;cursor:pointer;display:flex;align-items:center;gap:7px;min-width:0;}
  .pen{color:var(--ink-soft);font-size:12px;flex:0 0 auto;}
  .badge{font-size:10px;font-weight:800;color:#fff;padding:2px 6px;border-radius:6px;flex:0 0 auto;}
  .badge.l{background:var(--leader);} .badge.m{background:var(--mgr);}

  .cells{display:flex;gap:6px;}
  .cell{width:46px;padding:8px 0;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-family:inherit;font-weight:800;font-size:15px;color:#c3bdb0;cursor:pointer;transition:.12s;}
  .cell:active{transform:scale(.9);}
  .cell.o{background:var(--o);border-color:var(--o);color:#fff;}
  .cell.x{background:#fdecec;border-color:#f0b4b4;color:var(--x);}
  .cell.v{background:var(--x);border-color:var(--x);color:#fff;}
  .cell.sep{margin-left:10px;position:relative;}
  .cell.sep::before{content:"";position:absolute;left:-6px;top:2px;bottom:2px;width:1.5px;background:var(--line);}
  .labs span.sep{margin-left:10px;}

  .del{width:30px;height:30px;border-radius:8px;border:1.5px solid #f0c0c0;background:#fff;color:var(--x);font-weight:800;font-size:18px;line-height:1;cursor:pointer;padding:0;}
  .pro{width:30px;height:30px;border-radius:8px;border:1.5px solid #ead9c4;background:#fff;font-size:15px;line-height:1;cursor:pointer;padding:0;}

  .add-row{padding:9px 15px 13px;display:none;}
  body.edit .add-row{display:block;}
  .add-btn{width:100%;border:1.5px dashed var(--line);background:transparent;color:var(--ink-soft);font-family:inherit;font-weight:800;font-size:13px;border-radius:10px;padding:9px;cursor:pointer;}
  .add-team{display:none;margin:0 0 16px;}
  body.edit .add-team{display:block;}

  .status-toggle{width:100%;border:1.5px dashed var(--line);background:transparent;color:var(--ink);font-family:inherit;font-size:14px;font-weight:800;border-radius:14px;padding:13px;cursor:pointer;margin:4px 0 12px;}
  .status{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:6px 4px 10px;margin-bottom:14px;display:none;}
  .status.show{display:block;}
  table{width:100%;border-collapse:collapse;}
  th,td{padding:9px 6px;text-align:center;font-size:14px;}
  th{font-size:12px;color:var(--ink-soft);font-weight:700;border-bottom:1.5px solid var(--line);}
  td{border-top:1px solid #f1ede4;font-weight:600;}
  td.day{font-weight:800;text-align:left;padding-left:14px;}
  td.day span{font-weight:600;color:var(--ink-soft);font-size:12px;margin-left:3px;}
  td.v{color:var(--o);font-weight:800;}
  tr.cur td{background:#faf8f3;}
  tr.total td{border-top:2px solid var(--line);font-weight:800;font-size:15px;background:#faf8f3;}

  footer{text-align:center;font-size:11px;color:var(--ink-soft);padding:8px 0 4px;line-height:1.7;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>독션 식수체크</h1>
    <div class="htools">
      <div class="conn"><span class="dot" id="dot"></span><span id="connTxt">연결 중…</span></div>
      <button class="edit-btn" id="editBtn">편집</button>
    </div>
  </header>

  <div class="sticky"><div class="tabs" id="tabs"></div></div>
  <div class="date-edit" id="dateEdit"></div>
  <div class="import-box">
    <input type="file" id="xlsxFile" accept=".xlsx,.xls" style="display:none">
    <button class="add-btn" id="importBtn">📥 엑셀(참석현황) 가져오기</button>
    <div class="imp-hint">엑셀의 <b>1</b> = 그 날짜 명단에 포함 · <b>빈칸</b> = 제외 · 이름으로 자동 매칭<br>점심·저녁·도착 체크는 그대로 유지돼요</div>
  </div>
  <div class="edit-note">
    오른쪽 <b style="color:var(--x)">×</b> = <b>이 날짜에서만</b> 빼기 (다른 날엔 그대로) · 다시 넣으려면 <b>+ 추가</b><br>
    <b>+ 추가</b>로 넣은 사람은 <b>지금 선택한 날짜에만</b> 들어가요 · 이름을 누르면 수정 · <b>👑</b> = 그 사람을 팀장으로
  </div>

  <div class="summary">
    <div class="scard"><span class="lab">🍚 점심 (O)</span><span class="num" id="sumL">0<small>명</small></span></div>
    <div class="scard"><span class="lab">🌙 저녁 (O)</span><span class="num" id="sumD">0<small>명</small></span></div>
    <div class="scard sc-v"><span class="lab">🚩 도착</span><span class="num" id="sumE">0<small>명</small></span></div>
  </div>

  <div id="app"></div>

  <button class="status-toggle" id="statusBtn">📊 전체 날짜 식수 현황 보기</button>
  <div class="status" id="status"></div>

  <footer>
    칸을 누르면 <b>미정(·) → O(먹음) → X(안먹음)</b> 순서로 바뀝니다<br>
    [편집]에서 날짜·인원 추가/수정/삭제 및 날짜별 참여 인원을 정할 수 있어요
  </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* =========================================================
   ⚙️ 설정 — 기존 munhwabu-siksu.html / teamday.html 의
   firebaseConfig 와 동일하게 넣으세요. (지역 주소 확인!)
========================================================= */
const firebaseConfig = {
  databaseURL: "https://k-hary-default-rtdb.firebaseio.com"
};
const DB_PATH = "siksu_2026_06";
const YEAR = 2026;
const KDAY = ["일","월","화","수","목","금","토"];

/* ===== 기본 날짜 (없을 때만 처음 1회 생성) ===== */
const DEFAULT_DATES = [
  { key:"0627", label:"6/27", day:"토" },
  { key:"0628", label:"6/28", day:"일" },
  { key:"0629", label:"6/29", day:"월" },
  { key:"0703", label:"7/3",  day:"금" },
  { key:"0704", label:"7/4",  day:"토" },
  { key:"0705", label:"7/5",  day:"일" },
  { key:"0706", label:"7/6",  day:"월" },
  { key:"0708", label:"7/8",  day:"수" },
];

/* ===== 기본 명단 (없을 때만 처음 1회 생성) ===== */
const INIT_TEAMS = [
  { leader:"남이슬", members:["안연주","김보겸","이예희","김태인","이서연","조유정","박현후"] },
  { leader:"김건하", members:["손주환","염창민","조현석","임동휘","하희중","이승재"] },
  { leader:"박웅비", members:["홍한위","강윤찬","최예찬","박지효","정진수","김지한"] },
  { leader:"조상원", members:["문요원","박진홍","송하선","김우중","권태현","양희석","김한주"] },
  { leader:"김성욱", members:["안진성","김주석","최준수","윤석현","이수연","김채민","노현서","채승민"] },
];
function buildDefaultRoster(){
  const teams={}, names={};
  INIT_TEAMS.forEach((tm,t)=>{
    const lid="t"+t+"_"+tm.leader; names[lid]=tm.leader;
    const mids=tm.members.map(m=>{const id="t"+t+"_"+m; names[id]=m; return id;});
    teams["t"+t]={ seq:t, leader:lid, members:mids };
  });
  return { teams, managers:[], names };
}
const DEFAULT_ROSTER = buildDefaultRoster();

/* ===== 상태 ===== */
let db=null, data={}, roster=DEFAULT_ROSTER, dates=DEFAULT_DATES.slice();
let connected=false, editMode=false, initing=false, dragState=null;
let selected = DEFAULT_DATES[0].key;

/* ===== Firebase ===== */
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  db.ref(".info/connected").on("value", s=>{
    connected = s.val()===true;
    document.getElementById("dot").classList.toggle("on", connected);
    document.getElementById("connTxt").textContent = connected ? "실시간 연결됨" : "연결 끊김";
  });
  db.ref(DB_PATH).on("value", snap=>{
    data = snap.val() || {};
    roster = data._roster || DEFAULT_ROSTER;
    dates  = data._dates  || DEFAULT_DATES.slice();
    initIfEmpty(); renderAll();
  });
}catch(e){ document.getElementById("connTxt").textContent="설정 필요"; console.error(e); renderAll(); }
/* DB가 "정말로" 비어있을 때만 기본값을 1회 생성.
   트랜잭션으로 서버의 현재값을 직접 보고 판단하므로, 이미 저장된
   명단/날짜를 절대 덮어쓰지 않음 (편집 내용 보존). */
function initIfEmpty(){
  if(!db || initing) return;
  initing=true;
  db.ref(DB_PATH+"/_roster").transaction(cur => (cur==null) ? DEFAULT_ROSTER : undefined);
  db.ref(DB_PATH+"/_dates").transaction(cur => (cur==null) ? DEFAULT_DATES : undefined);
}

/* ===== 날짜 ===== */
function parseMD(s){ const m=String(s).match(/(\d{1,2})\s*[\/.\-월]\s*(\d{1,2})/); return m?{mo:+m[1],d:+m[2]}:null; }
function mkDate(s){ const p=parseMD(s); if(!p)return null; return {label:p.mo+"/"+p.d, day:KDAY[new Date(YEAR,p.mo-1,p.d).getDay()]}; }
function sortedDates(){ return dates.slice().sort((a,b)=>{const pa=parseMD(a.label)||{mo:99,d:99},pb=parseMD(b.label)||{mo:99,d:99};return (pa.mo*100+pa.d)-(pb.mo*100+pb.d);}); }

/* ===== 명단 ===== */
function nameOf(id){ return (roster.names && roster.names[id]) || id; }
function teamList(){ const t=roster.teams||{}; return Object.keys(t).map(k=>Object.assign({key:k},t[k])).sort((a,b)=>(a.seq||0)-(b.seq||0)); }
function memberIds(tm){ return tm.members||[]; }
function managerIds(){ return roster.managers||[]; }
function allIds(){ const ids=[...managerIds()]; teamList().forEach(tm=>{ if(tm.leader)ids.push(tm.leader); ids.push(...memberIds(tm)); }); return ids; }

/* ===== 날짜별 참여/제외 ===== */
function isOff(dk,id){ return !!(data._dayoff && data._dayoff[dk] && data._dayoff[dk][id]); }

/* ===== 식사 값 ===== */
function val(dk,meal,id){ const v=data&&data[dk]&&data[dk][meal]?data[dk][meal][id]:undefined; if(v===true)return "O"; return v||null; }
function countIds(ids,dk,meal){ return ids.filter(id=>!isOff(dk,id)&&val(dk,meal,id)==="O").length; }
function countV(ids,dk){ return ids.filter(id=>!isOff(dk,id)&&val(dk,"etc",id)==="V").length; }
function countMeal(dk,meal){ return countIds(allIds(),dk,meal); }
function countMealV(dk){ return countV(allIds(),dk); }
function cycleV(id){ if(!db||!connected){alert("실시간 연결 후 사용하세요.");return;}
  const cur=val(selected,"etc",id); db.ref(`${DB_PATH}/${selected}/etc/${id}`).set(cur==="V"?null:"V"); }
function cycle(id,meal){ if(!db||!connected){alert("실시간 연결 후 사용하세요.");return;}
  const cur=val(selected,meal,id); const next=cur==="O"?"X":cur==="X"?null:"O";
  db.ref(`${DB_PATH}/${selected}/${meal}/${id}`).set(next); }

/* ===== 편집 공통 ===== */
function rRef(){ return db.ref(DB_PATH+"/_roster"); }
function newId(){ return "p_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function guard(){ if(!db||!connected){ alert("실시간 연결 후 편집하세요."); return false; } return true; }
function clearAtt(id){ dates.forEach(d=>{ db.ref(`${DB_PATH}/${d.key}/lunch/${id}`).set(null); db.ref(`${DB_PATH}/${d.key}/dinner/${id}`).set(null); db.ref(`${DB_PATH}/_dayoff/${d.key}/${id}`).set(null); }); }

/* ===== 날짜 편집 ===== */
function addDate(){ if(!guard())return; const s=prompt("추가할 날짜 (예: 7/10)"); if(!s)return;
  const md=mkDate(s); if(!md){alert("날짜 형식이 올바르지 않아요. 예: 7/10");return;}
  db.ref(DB_PATH+"/_dates").set([...dates,{key:"d_"+Date.now().toString(36),label:md.label,day:md.day}]); }
function editDate(key){ if(!guard())return; const cur=dates.find(d=>d.key===key); if(!cur)return;
  const s=prompt("날짜 수정 (예: 7/10)",cur.label); if(s===null)return;
  const md=mkDate(s); if(!md){alert("날짜 형식이 올바르지 않아요. 예: 7/10");return;}
  db.ref(DB_PATH+"/_dates").set(dates.map(d=>d.key===key?{key:d.key,label:md.label,day:md.day}:d)); }
function delDate(key){ if(!guard())return; if(dates.length<=1){alert("최소 1개 날짜는 남겨주세요.");return;}
  const cur=dates.find(d=>d.key===key);
  if(!confirm((cur?cur.label:"")+" 날짜를 삭제할까요? (해당 날짜 체크 내용도 사라집니다)"))return;
  db.ref(DB_PATH+"/_dates").set(dates.filter(d=>d.key!==key)); db.ref(DB_PATH+"/"+key).set(null); db.ref(DB_PATH+"/_dayoff/"+key).set(null); }

/* ===== 명단 편집 (× = 그 날짜에서만 빼기 / + = 그 날짜에 넣기) ===== */
function excludeOtherDates(id){ dates.forEach(d=>{ if(d.key!==selected) db.ref(`${DB_PATH}/_dayoff/${d.key}/${id}`).set(true); }); }
function dayRemove(id){ if(!guard())return;
  const d=dates.find(x=>x.key===selected);
  if(!confirm(nameOf(id)+" 님을 "+(d?d.label:"이 날짜")+" 명단에서 뺄까요?"))return;
  db.ref(`${DB_PATH}/_dayoff/${selected}/${id}`).set(true); }
function addManager(){ if(!guard())return; const nm=prompt("이 날짜에 추가할 관리자 이름"); if(!nm||!nm.trim())return; const name=nm.trim();
  const ex=managerIds().find(x=>nameOf(x)===name);
  if(ex){ db.ref(`${DB_PATH}/_dayoff/${selected}/${ex}`).set(null); return; }
  const id=newId(),u={}; u["names/"+id]=name; u["managers"]=[...managerIds(),id]; rRef().update(u); excludeOtherDates(id); }
function addMember(tk){ if(!guard())return; const nm=prompt("이 날짜에 추가할 사람 이름"); if(!nm||!nm.trim())return; const name=nm.trim();
  const ex=(roster.teams[tk].members||[]).find(x=>nameOf(x)===name);
  if(ex){ db.ref(`${DB_PATH}/_dayoff/${selected}/${ex}`).set(null); return; }
  const id=newId(),u={}; u["names/"+id]=name; u["teams/"+tk+"/members"]=[...(roster.teams[tk].members||[]),id]; rRef().update(u); excludeOtherDates(id); }
function addTeam(){ if(!guard())return; const nm=prompt("새 팀장 이름"); if(!nm||!nm.trim())return;
  const id=newId(); let n=0; while(roster.teams&&roster.teams["t"+n])n++;
  const u={}; u["names/"+id]=nm.trim(); u["teams/t"+n]={seq:teamList().length,leader:id,members:[]}; rRef().update(u); }
function renamePerson(id){ if(!guard())return; const nm=prompt("이름 수정",nameOf(id)); if(nm===null||!nm.trim())return; rRef().child("names/"+id).set(nm.trim()); }
function makeLeader(tk,id){ if(!guard())return; const tm=roster.teams[tk]; if(!tm||tm.leader===id)return;
  if(!confirm(nameOf(id)+" 님을 이 팀의 팀장으로 바꿀까요?\n(기존 팀장 "+nameOf(tm.leader)+" 님은 팀원으로 내려갑니다)"))return;
  const mem=[tm.leader, ...(tm.members||[]).filter(x=>x!==id)];
  const u={}; u["teams/"+tk+"/leader"]=id; u["teams/"+tk+"/members"]=mem; rRef().update(u); }
function delTeam(tk){ if(!guard())return; const tm=roster.teams[tk]; if(!confirm(nameOf(tm.leader)+"팀 전체를 삭제할까요? (모든 날짜)"))return;
  const u={}; u["teams/"+tk]=null; u["names/"+tm.leader]=null; (tm.members||[]).forEach(id=>u["names/"+id]=null);
  rRef().update(u); clearAtt(tm.leader); (tm.members||[]).forEach(clearAtt); }

/* ===== 렌더 ===== */
function cellHtml(id,meal){ const v=val(selected,meal,id); const cls=v==="O"?"o":v==="X"?"x":""; const g=v==="O"?"O":v==="X"?"X":"·";
  return `<button class="cell ${cls}" data-act="cell" data-id="${id}" data-meal="${meal}">${g}</button>`; }
function cellV(id){ const on=val(selected,"etc",id)==="V";
  return `<button class="cell sep ${on?'v':''}" data-act="cellV" data-id="${id}">${on?'V':'·'}</button>`; }
function badgeHtml(role){ return role==="leader"?'<span class="badge l">팀장</span>':role==="manager"?'<span class="badge m">관리자</span>':''; }
function rowHtml(id,role,tk){
  const nm=nameOf(id), badge=badgeHtml(role);
  if(!editMode){
    return `<div class="row n"><span class="nm">${nm}${badge}</span><div class="cells">${cellHtml(id,"lunch")}${cellHtml(id,"dinner")}${cellV(id)}</div></div>`;
  }
  const nameBtn=`<button class="nm-edit" data-act="rename" data-id="${id}">${nm}${badge}<span class="pen">✎</span></button>`;
  const promote= role==="member"
    ? `<button class="pro" data-act="makeLeader" data-id="${id}" data-team="${tk}" title="팀장으로">👑</button>`
    : `<span></span>`;
  const grip= role==="leader" ? `<span></span>`
    : `<button class="grip" data-id="${id}" data-grp="${role==="manager"?"mgr":"team"}" data-team="${tk||''}">≡</button>`;
  const del=`<button class="del" data-act="dayDel" data-id="${id}">×</button>`;
  return `<div class="row e">${grip}${nameBtn}<div class="cells">${cellHtml(id,"lunch")}${cellHtml(id,"dinner")}${cellV(id)}</div>${promote}${del}</div>`;
}
function colHead(){ return editMode
  ? `<div class="col-head e"><span></span><span></span><div class="labs"><span>점심</span><span>저녁</span><span class="sep">도착</span></div><span></span><span></span></div>`
  : `<div class="col-head n"><span></span><div class="labs"><span>점심</span><span>저녁</span><span class="sep">도착</span></div></div>`; }

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=sortedDates().map(d=>`<div class="tab ${d.key===selected?'active':''}" data-k="${d.key}"><b>${d.label}</b><span>${d.day}</span></div>`).join("");
  el.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{selected=t.dataset.k;renderAll();});
}
function renderDateEdit(){
  const chips=sortedDates().map(d=>`<div class="de-chip"><b>${d.label}</b> <span class="wd">${d.day}</span>
    <button class="mini" data-act="editDate" data-key="${d.key}">✎</button>
    <button class="mini del" data-act="delDate" data-key="${d.key}">×</button></div>`).join("");
  document.getElementById("dateEdit").innerHTML=`<div class="de-title">📅 날짜 관리 (추가 · 수정 · 삭제)</div><div class="de-chips">${chips}<button class="de-add" data-act="addDate">+ 날짜 추가</button></div>`;
}
function renderSummary(){
  document.getElementById("sumL").innerHTML=countMeal(selected,"lunch")+'<small>명</small>';
  document.getElementById("sumD").innerHTML=countMeal(selected,"dinner")+'<small>명</small>';
  document.getElementById("sumE").innerHTML=countMealV(selected)+'<small>명</small>';
}
function renderApp(){
  let html="";
  // 관리자
  const mids=managerIds();
  const mvis= mids.filter(id=>!isOff(selected,id));
  if(editMode || mvis.length){
    html+=`<div class="card"><div class="card-head"><div class="card-name mgr">관리자</div>
      <div class="card-sub">점심 <i>${countIds(mids,selected,"lunch")}</i> · 저녁 <i>${countIds(mids,selected,"dinner")}</i> · 도착 <i>${countV(mids,selected)}</i></div></div>`;
    if(mvis.length) html+=colHead()+mvis.map(id=>rowHtml(id,"manager")).join("");
    html+=`<div class="add-row"><button class="add-btn" data-act="addMgr">+ 관리자 추가</button></div></div>`;
  }
  // 팀
  teamList().forEach(tm=>{
    const ids=[tm.leader,...memberIds(tm)].filter(Boolean);
    const vis= ids.filter(id=>!isOff(selected,id));
    if(!editMode && !vis.length) return;
    const nameEl= editMode
      ? `<button class="card-name-edit" data-act="rename" data-id="${tm.leader}">${nameOf(tm.leader)} 팀 <span class="pen">✎</span></button>`
      : `<div class="card-name">${nameOf(tm.leader)} 팀</div>`;
    html+=`<div class="card"><div class="card-head">${nameEl}
      <div style="display:flex;align-items:center;gap:10px">
        <div class="card-sub">점심 <i>${countIds(ids,selected,"lunch")}</i> · 저녁 <i>${countIds(ids,selected,"dinner")}</i> · 도착 <i>${countV(ids,selected)}</i></div>
        <button class="team-del" data-act="delTeam" data-team="${tm.key}">×</button>
      </div></div>`;
    if(vis.length) html+=colHead();
    vis.forEach(id=> html+=rowHtml(id, id===tm.leader?"leader":"member", tm.key));
    html+=`<div class="add-row"><button class="add-btn" data-act="addMem" data-team="${tm.key}">+ 팀원 추가</button></div></div>`;
  });
  html+=`<button class="add-btn add-team" data-act="addTeam">+ 팀 추가</button>`;
  document.getElementById("app").innerHTML=html;
}
function renderStatus(){
  let tl=0,td=0;
  const rows=sortedDates().map(d=>{ const l=countMeal(d.key,"lunch"),dn=countMeal(d.key,"dinner"); tl+=l;td+=dn;
    return `<tr class="${d.key===selected?'cur':''}"><td class="day">${d.label}<span>${d.day}</span></td><td class="v">${l}</td><td class="v">${dn}</td></tr>`; }).join("");
  document.getElementById("status").innerHTML=`<table>
    <thead><tr><th style="text-align:left;padding-left:14px">날짜</th><th>🍚 점심</th><th>🌙 저녁</th></tr></thead>
    <tbody>${rows}<tr class="total"><td class="day">합계</td><td>${tl}</td><td>${td}</td></tr></tbody></table>`;
}
function renderAll(){
  if(dragState) return;
  if(!dates.some(d=>d.key===selected)){ const s=sortedDates()[0]; selected=s?s.key:null; }
  renderTabs(); renderDateEdit(); renderSummary(); renderApp(); renderStatus();
}

/* ===== 이벤트 ===== */
function handleClick(e){
  const b=e.target.closest("button"); if(!b)return;
  const a=b.dataset.act, id=b.dataset.id, tk=b.dataset.team, key=b.dataset.key;
  switch(a){
    case "cell": cycle(id,b.dataset.meal); break;
    case "cellV": cycleV(id); break;
    case "dayDel": dayRemove(id); break;
    case "rename": renamePerson(id); break;
    case "makeLeader": makeLeader(tk,id); break;
    case "delTeam": delTeam(tk); break;
    case "addMgr": addManager(); break;
    case "addMem": addMember(tk); break;
    case "addTeam": addTeam(); break;
    case "addDate": addDate(); break;
    case "editDate": editDate(key); break;
    case "delDate": delDate(key); break;
  }
}
document.getElementById("app").addEventListener("click",handleClick);
document.getElementById("dateEdit").addEventListener("click",handleClick);
document.getElementById("editBtn").onclick=()=>{
  editMode=!editMode; document.body.classList.toggle("edit",editMode);
  document.getElementById("editBtn").textContent=editMode?"완료":"편집"; renderAll();
};
document.getElementById("statusBtn").onclick=()=>{
  const s=document.getElementById("status"); const open=s.classList.toggle("show");
  document.getElementById("statusBtn").textContent=open?"📊 전체 현황 닫기":"📊 전체 날짜 식수 현황 보기";
};

/* ===== 엑셀(참석현황) 가져오기 ===== */
function importExcel(file){
  if(!guard())return;
  if(typeof XLSX==="undefined"){ alert("엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요."); return; }
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
      let hi=rows.findIndex(r=>r&&r.some(c=>String(c).trim()==="이름")); if(hi<0)hi=0;
      const header=rows[hi]||[];
      const colDate={};
      for(let c=1;c<header.length;c++){
        const h=String(header[c]||""); if(h.includes("합계"))continue;
        const m=h.match(/(\d{1,2})\s*월\s*(\d{1,2})/)||h.match(/(\d{1,2})\D+(\d{1,2})/); if(!m)continue;
        const mo=+m[1],d=+m[2];
        const hit=dates.find(x=>{const p=parseMD(x.label);return p&&p.mo===mo&&p.d===d;});
        if(hit)colDate[c]=hit.key;
      }
      if(!Object.keys(colDate).length){ alert("엑셀에서 날짜 열을 찾지 못했어요. (예: '6월 27일' 형식)"); return; }
      const nameToId={}; allIds().forEach(id=>{const n=nameOf(id); if(!(n in nameToId))nameToId[n]=id;});
      const dayUpd={}; const newPeople=[]; let matched=0;
      for(let r=hi+1;r<rows.length;r++){
        const row=rows[r]||[]; const name=String(row[0]||"").trim();
        if(!name||name==="합계")continue;
        let id=nameToId[name];
        if(!id){ id="p_imp"+r+Math.random().toString(36).slice(2,5); newPeople.push({id,name}); nameToId[name]=id; }
        else matched++;
        for(const c in colDate){
          const cell=String(row[c]||"").trim();
          const present = cell!=="" && cell!=="0" && cell.toLowerCase()!=="x";
          dayUpd[`${colDate[c]}/${id}`] = present ? null : true;
        }
      }
      if(newPeople.length){
        const ru={};
        if(roster.teams&&roster.teams["t_import"]){
          ru["teams/t_import/members"]=[...(roster.teams["t_import"].members||[]),...newPeople.map(p=>p.id)];
          newPeople.forEach(p=>ru["names/"+p.id]=p.name);
        }else{
          ru["teams/t_import"]={seq:teamList().length,leader:newPeople[0].id,members:newPeople.slice(1).map(p=>p.id)};
          newPeople.forEach(p=>ru["names/"+p.id]=p.name);
        }
        rRef().update(ru);
      }
      db.ref(DB_PATH+"/_dayoff").update(dayUpd);
      alert("가져오기 완료!\n적용 날짜: "+Object.keys(colDate).length+"개\n기존 명단 적용: "+matched+"명"
        +(newPeople.length?("\n새로 추가: "+newPeople.length+"명 ('"+nameOf(newPeople[0].id)+" 팀'으로)"):"")
        +"\n\n점심·저녁·도착 체크는 그대로 유지됩니다.");
    }catch(err){ alert("엑셀을 읽지 못했어요: "+err.message); console.error(err); }
  };
  reader.readAsArrayBuffer(file);
}
document.getElementById("importBtn").onclick=()=>document.getElementById("xlsxFile").click();
document.getElementById("xlsxFile").onchange=e=>{ const f=e.target.files[0]; if(f)importExcel(f); e.target.value=""; };

/* ===== 드래그로 순서 바꾸기 (팀원끼리 / 관리자끼리, 모든 날짜 공통) ===== */
function dragRows(){ return dragState ? [...dragState.card.querySelectorAll(".row.e")].filter(r=>r.querySelector(".grip")) : []; }
function onPointerDown(e){
  const grip=e.target.closest(".grip"); if(!grip||!editMode||!db||!connected) return;
  const row=grip.closest(".row"); if(!row) return;
  e.preventDefault();
  dragState={ grp:grip.dataset.grp, tk:grip.dataset.team||"", card:row.parentElement, row };
  row.classList.add("dragging");
  try{ row.setPointerCapture(e.pointerId); }catch(_){}
}
function onPointerMove(e){
  if(!dragState) return; e.preventDefault();
  const y=e.clientY, row=dragState.row;
  const rows=dragRows(); let target=null;
  for(const r of rows){ if(r===row) continue; const rc=r.getBoundingClientRect(); if(y < rc.top+rc.height/2){ target=r; break; } }
  if(target){ if(target!==row.nextSibling) dragState.card.insertBefore(row,target); }
  else { const last=rows[rows.length-1]; if(last&&last!==row) dragState.card.insertBefore(row,last.nextSibling); }
}
function onPointerUp(){
  if(!dragState) return;
  const {grp,tk,card,row}=dragState;
  row.classList.remove("dragging");
  const order=[...card.querySelectorAll(".row.e")].filter(r=>r.querySelector(".grip")).map(r=>r.querySelector(".grip").dataset.id);
  dragState=null;
  if(db&&connected){ if(grp==="mgr") rRef().child("managers").set(order); else rRef().child("teams/"+tk+"/members").set(order); }
  else renderAll();
}
document.getElementById("app").addEventListener("pointerdown",onPointerDown);
document.addEventListener("pointermove",onPointerMove,{passive:false});
document.addEventListener("pointerup",onPointerUp);
document.addEventListener("pointercancel",onPointerUp);

renderAll();
</script>
</body>
</html>
