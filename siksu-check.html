<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>문화부 식수 인원 체크</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --paper:#f4f1ea;
    --card:#ffffff;
    --ink:#2a2620;
    --ink-soft:#8a8275;
    --line:#e6e1d6;
    --lunch:#1f9d57;       /* 점심 */
    --lunch-soft:#e7f5ec;
    --dinner:#4f46e5;      /* 저녁 */
    --dinner-soft:#ecebfb;
    --leader:#c2410c;
    --live:#16a34a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard',-apple-system,system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.4;
    padding-bottom:48px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 14px;}

  /* ===== header ===== */
  header{padding:20px 0 12px;display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
  header h1{font-size:21px;font-weight:800;letter-spacing:-0.02em;margin:0;}
  .conn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);font-weight:600;}
  .dot{width:8px;height:8px;border-radius:50%;background:#cbb;transition:.3s;}
  .dot.on{background:var(--live);box-shadow:0 0 0 3px rgba(22,163,74,.18);}

  /* ===== sticky bar ===== */
  .sticky{position:sticky;top:0;z-index:20;background:var(--paper);padding-top:6px;}
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);
    border-radius:13px;padding:7px 13px;text-align:center;cursor:pointer;
    transition:.15s;min-width:52px;
  }
  .tab b{display:block;font-size:15px;font-weight:800;letter-spacing:-0.02em;}
  .tab span{display:block;font-size:11px;color:var(--ink-soft);font-weight:600;margin-top:1px;}
  .tab.active{background:var(--ink);border-color:var(--ink);}
  .tab.active b,.tab.active span{color:#fff;}

  /* ===== summary ===== */
  .summary{display:flex;gap:10px;padding-bottom:14px;}
  .scard{
    flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:16px;
    padding:13px 15px;display:flex;align-items:center;justify-content:space-between;
  }
  .scard .lab{font-size:13px;font-weight:700;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
  .scard .num{font-size:30px;font-weight:800;letter-spacing:-0.03em;line-height:1;}
  .scard .num small{font-size:14px;font-weight:700;color:var(--ink-soft);margin-left:2px;}
  .scard.lunch .num{color:var(--lunch);} .scard.lunch{border-color:#cfe9d8;}
  .scard.dinner .num{color:var(--dinner);} .scard.dinner{border-color:#d6d4f6;}

  /* ===== team card ===== */
  .team{background:var(--card);border:1.5px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden;}
  .team-head{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--line);background:#faf8f3;}
  .team-name{font-size:15px;font-weight:800;letter-spacing:-0.02em;}
  .team-sub{font-size:12px;font-weight:700;color:var(--ink-soft);}
  .team-sub i{font-style:normal;color:var(--lunch);} .team-sub em{font-style:normal;color:var(--dinner);}

  .row{display:flex;align-items:center;padding:9px 15px;border-top:1px solid #f1ede4;}
  .row:first-child{border-top:none;}
  .nm{flex:1;font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .badge{font-size:10px;font-weight:800;color:#fff;background:var(--leader);padding:2px 6px;border-radius:6px;letter-spacing:.02em;}
  .toggles{display:flex;gap:7px;}
  .pill{
    border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);
    font-family:inherit;font-size:13px;font-weight:800;border-radius:10px;
    padding:7px 0;width:52px;text-align:center;cursor:pointer;transition:.12s;
    user-select:none;
  }
  .pill:active{transform:scale(.93);}
  .pill.on.l{background:var(--lunch);border-color:var(--lunch);color:#fff;}
  .pill.on.d{background:var(--dinner);border-color:var(--dinner);color:#fff;}

  /* ===== status table ===== */
  .status-toggle{
    width:100%;border:1.5px dashed var(--line);background:transparent;color:var(--ink);
    font-family:inherit;font-size:14px;font-weight:800;border-radius:14px;padding:13px;
    cursor:pointer;margin:4px 0 12px;
  }
  .status{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:6px 4px 10px;margin-bottom:14px;display:none;}
  .status.show{display:block;}
  table{width:100%;border-collapse:collapse;}
  th,td{padding:9px 6px;text-align:center;font-size:14px;}
  th{font-size:12px;color:var(--ink-soft);font-weight:700;border-bottom:1.5px solid var(--line);}
  td{border-top:1px solid #f1ede4;font-weight:600;}
  td.day{font-weight:800;text-align:left;padding-left:14px;}
  td.day span{font-weight:600;color:var(--ink-soft);font-size:12px;margin-left:3px;}
  td.l{color:var(--lunch);font-weight:800;} td.d{color:var(--dinner);font-weight:800;}
  tr.cur td{background:#faf8f3;}
  tr.total td{border-top:2px solid var(--line);font-weight:800;font-size:15px;background:#faf8f3;}
  tr.total td.day{color:var(--ink);}

  footer{text-align:center;font-size:11px;color:var(--ink-soft);padding:8px 0 4px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>문화부 식수 인원 체크</h1>
    <div class="conn"><span class="dot" id="dot"></span><span id="connTxt">연결 중…</span></div>
  </header>

  <div class="sticky">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="summary">
    <div class="scard lunch">
      <span class="lab">🍚 점심</span>
      <span class="num" id="sumL">0<small>명</small></span>
    </div>
    <div class="scard dinner">
      <span class="lab">🌙 저녁</span>
      <span class="num" id="sumD">0<small>명</small></span>
    </div>
  </div>

  <div id="teams"></div>

  <button class="status-toggle" id="statusBtn">📊 전체 날짜 식수 현황 보기</button>
  <div class="status" id="status"></div>

  <footer>이름을 누르면 바로 저장돼요 · 모두의 폰에서 실시간으로 합산됩니다</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>
/* =========================================================
   ⚙️ 설정 — 본인 Firebase 설정으로 교체하세요.
   teamday.html / munhwabu-siksu.html 에 쓰던 k-hary 설정과
   같은 값을 넣으면 됩니다. (databaseURL 지역이 다르면 꼭 수정!)
========================================================= */
const firebaseConfig = {
  databaseURL: "https://k-hary-default-rtdb.firebaseio.com"
};
const DB_PATH = "siksu_2026_06";   // 저장 경로 (원하면 바꿔도 됨)

/* ===== 명단 ===== */
const TEAMS = [
  { leader:"남이슬", members:["안연주","김보겸","이예희","김태인","이서연","조유정","박현후"] },
  { leader:"김건하", members:["손주환","염창민","조현석","임동휘","하희중","이승재"] },
  { leader:"박웅비", members:["홍한위","강윤찬","최예찬","박지효","정진수","김지한"] },
  { leader:"조상원", members:["문요원","박진홍","송하선","김우중","권태현","양희석","김한주"] },
  { leader:"김성욱", members:["안진성","김주석","최준수","윤석현","이수연","김채민","노현서","채승민"] },
];

/* ===== 날짜 ===== */
const DATES = [
  { key:"0627", label:"6/27", day:"토" },
  { key:"0628", label:"6/28", day:"일" },
  { key:"0629", label:"6/29", day:"월" },
  { key:"0703", label:"7/3",  day:"금" },
  { key:"0704", label:"7/4",  day:"토" },
  { key:"0705", label:"7/5",  day:"일" },
  { key:"0706", label:"7/6",  day:"월" },
  { key:"0708", label:"7/8",  day:"수" },
];

/* ===== 사람마다 고유 id (이름 중복 안전) ===== */
function pid(t,name){ return "t"+t+"_"+name; }
const ALL_IDS = [];
TEAMS.forEach((tm,t)=>{
  ALL_IDS.push(pid(t,tm.leader));
  tm.members.forEach(m=>ALL_IDS.push(pid(t,m)));
});

/* ===== Firebase ===== */
let db=null, data={};
let selected = DATES[0].key;

try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  db.ref(".info/connected").on("value", s=>{
    const ok = s.val()===true;
    document.getElementById("dot").classList.toggle("on", ok);
    document.getElementById("connTxt").textContent = ok ? "실시간 연결됨" : "연결 끊김";
  });
  db.ref(DB_PATH).on("value", snap=>{
    data = snap.val() || {};
    renderAll();
  });
}catch(e){
  document.getElementById("connTxt").textContent = "설정 필요";
  console.error(e);
}

/* ===== 데이터 helper ===== */
function isOn(dateKey, meal, id){ return !!(data?.[dateKey]?.[meal]?.[id]); }
function countMeal(dateKey, meal){
  const o = data?.[dateKey]?.[meal] || {};
  let n=0; for(const k in o){ if(o[k]) n++; } return n;
}
function countTeam(dateKey, meal, teamIdx){
  const tm = TEAMS[teamIdx];
  const ids = [pid(teamIdx,tm.leader), ...tm.members.map(m=>pid(teamIdx,m))];
  return ids.filter(id=>isOn(dateKey,meal,id)).length;
}

/* ===== 체크 토글 ===== */
function toggle(id, meal){
  if(!db){ alert("Firebase 설정을 먼저 입력해주세요."); return; }
  const on = isOn(selected, meal, id);
  db.ref(`${DB_PATH}/${selected}/${meal}/${id}`).set(on ? null : true);
}

/* ===== 렌더: 날짜 탭 ===== */
function renderTabs(){
  const el = document.getElementById("tabs");
  el.innerHTML = DATES.map(d=>`
    <div class="tab ${d.key===selected?'active':''}" data-k="${d.key}">
      <b>${d.label}</b><span>${d.day}</span>
    </div>`).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ selected = t.dataset.k; renderAll(); };
  });
}

/* ===== 렌더: 요약 ===== */
function renderSummary(){
  document.getElementById("sumL").innerHTML = countMeal(selected,"lunch")+'<small>명</small>';
  document.getElementById("sumD").innerHTML = countMeal(selected,"dinner")+'<small>명</small>';
}

/* ===== 렌더: 팀 카드 ===== */
function personRow(t, name, isLeader){
  const id = pid(t,name);
  const l = isOn(selected,"lunch",id) ? "on l" : "";
  const d = isOn(selected,"dinner",id) ? "on d" : "";
  return `<div class="row">
    <div class="nm">${name}${isLeader?'<span class="badge">팀장</span>':''}</div>
    <div class="toggles">
      <button class="pill l ${l}" data-id="${id}" data-meal="lunch">점심</button>
      <button class="pill d ${d}" data-id="${id}" data-meal="dinner">저녁</button>
    </div></div>`;
}
function renderTeams(){
  const el = document.getElementById("teams");
  el.innerHTML = TEAMS.map((tm,t)=>{
    const cl = countTeam(selected,"lunch",t);
    const cd = countTeam(selected,"dinner",t);
    const rows = personRow(t, tm.leader, true)
      + tm.members.map(m=>personRow(t,m,false)).join("");
    return `<div class="team">
      <div class="team-head">
        <div class="team-name">${tm.leader} 팀</div>
        <div class="team-sub">점심 <i>${cl}</i> · 저녁 <em>${cd}</em></div>
      </div>${rows}</div>`;
  }).join("");
  el.querySelectorAll(".pill").forEach(p=>{
    p.onclick = ()=> toggle(p.dataset.id, p.dataset.meal);
  });
}

/* ===== 렌더: 전체 현황 표 ===== */
function renderStatus(){
  const el = document.getElementById("status");
  let tl=0, td=0;
  const rows = DATES.map(d=>{
    const l=countMeal(d.key,"lunch"), dn=countMeal(d.key,"dinner");
    tl+=l; td+=dn;
    return `<tr class="${d.key===selected?'cur':''}">
      <td class="day">${d.label}<span>${d.day}</span></td>
      <td class="l">${l}</td><td class="d">${dn}</td></tr>`;
  }).join("");
  el.innerHTML = `<table>
    <thead><tr><th style="text-align:left;padding-left:14px">날짜</th><th>🍚 점심</th><th>🌙 저녁</th></tr></thead>
    <tbody>${rows}
      <tr class="total"><td class="day">합계</td><td>${tl}</td><td>${td}</td></tr>
    </tbody></table>`;
}

document.getElementById("statusBtn").onclick = ()=>{
  const s = document.getElementById("status");
  const open = s.classList.toggle("show");
  document.getElementById("statusBtn").textContent =
    open ? "📊 전체 현황 닫기" : "📊 전체 날짜 식수 현황 보기";
};

/* ===== 전체 렌더 ===== */
function renderAll(){
  renderTabs(); renderSummary(); renderTeams(); renderStatus();
}
renderAll();
</script>
</body>
</html>
